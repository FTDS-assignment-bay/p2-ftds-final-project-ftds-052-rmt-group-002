# =============================================================
#  StayWise ML Platform — Docker Compose
#  Production-grade stack definition
#
#  IMPORTANT: Run ./build.sh before first run to build base image.
#  After that: docker compose up -d
# =============================================================

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  image: staywise/airflow:latest
  user: "${AIRFLOW_UID}:0"
  env_file:
    - .env
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./docs:/opt/airflow/docs
    - ./logs:/opt/airflow/logs
    - ./models:/opt/airflow/models
    - ./notebooks:/opt/airflow/notebooks
    - ./plugins:/opt/airflow/plugins
    - ./src:/opt/airflow/src
    - /var/run/docker.sock:/var/run/docker.sock
  networks:
    - staywise-network
  restart: on-failure

x-airflow-depends: &airflow-depends
  depends_on:
    postgres-airflow:
      condition: service_healthy
    airflow-init:
      condition: service_completed_successfully

services:

  # ─── Databases ────────────────────────────────────────────────

  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    networks:
      - staywise-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${AIRFLOW_POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-mlflow:
    image: postgres:16
    container_name: postgres-mlflow
    environment:
      POSTGRES_USER: ${MLFLOW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${MLFLOW_POSTGRES_DB}
    volumes:
      - postgres_mlflow_data:/var/lib/postgresql/data
    networks:
      - staywise-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${MLFLOW_POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres-dw:
    image: timescale/timescaledb:latest-pg16
    container_name: postgres-dw
    environment:
      POSTGRES_USER: ${DW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DW_POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
      - ./src/db/staywise/01_staywise_schema.sql:/docker-entrypoint-initdb.d/01_staywise.sql:ro
      - ./src/db/sentiment/01_sentiment_schema.sql:/docker-entrypoint-initdb.d/02_sentiment.sql:ro
    networks:
      - staywise-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DW_POSTGRES_USER}", "-d", "${DW_POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: social_sentiment
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./config/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - staywise-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - staywise-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Kafka ────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - staywise-network
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - staywise-network
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── Airflow ──────────────────────────────────────────────────

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p \
          /opt/airflow/dags \
          /opt/airflow/data \
          /opt/airflow/docs \
          /opt/airflow/logs \
          /opt/airflow/models \
          /opt/airflow/notebooks \
          /opt/airflow/plugins \
          /opt/airflow/src
        exec /entrypoint airflow version

  airflow-scheduler:
    <<: [ *airflow-common, *airflow-depends ]
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: [ "CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)" ]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-webserver:
    <<: [ *airflow-common, *airflow-depends ]
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  # ─── MLflow ───────────────────────────────────────────────────

  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    image: staywise/mlflow:latest
    container_name: mlflow
    environment:
      MLFLOW_POSTGRES_USER: ${MLFLOW_POSTGRES_USER}
      MLFLOW_POSTGRES_PASSWORD: ${MLFLOW_POSTGRES_PASSWORD}
      MLFLOW_POSTGRES_DB: ${MLFLOW_POSTGRES_DB}
    ports:
      - "5000:5000"
    depends_on:
      postgres-mlflow:
        condition: service_healthy
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - staywise-network
    command: >
      mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri postgresql+psycopg2://${MLFLOW_POSTGRES_USER}:${MLFLOW_POSTGRES_PASSWORD}@postgres-mlflow/${MLFLOW_POSTGRES_DB} --default-artifact-root mlflow-artifacts:/ --artifacts-destination /mlflow/artifacts --serve-artifacts
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:5000/" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ─── API ──────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: staywise/api:latest
    container_name: staywise-api
    environment:
      DW_POSTGRES_HOST: ${DW_POSTGRES_HOST}
      DW_POSTGRES_USER: ${DW_POSTGRES_USER}
      DW_POSTGRES_PASSWORD: ${DW_POSTGRES_PASSWORD}
      DW_POSTGRES_DB: ${DW_POSTGRES_DB}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      REDIS_URL: ${REDIS_URL}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    ports:
      - "8000:8000"
    depends_on:
      postgres-dw:
        condition: service_healthy
    networks:
      - staywise-network
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── Kafka Producer & Consumer ────────────────────────────────

  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.sentiment
    image: staywise/sentiment:latest
    container_name: producer
    environment:
      DUMMY_MODE: "true"
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    command: python ingestion/kafka_dummy_stream.py producer --bootstrap kafka:29092 --speed 5.0
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data/sentimen-dummy-data:/app/data/sentimen-dummy-data
      - ./src/ingestion:/app/ingestion
      - ./src/workers:/app/workers
      - ./config:/app/config
    networks:
      - staywise-network
    restart: on-failure

  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.sentiment
    image: staywise/sentiment:latest
    container_name: consumer
    environment:
      DUMMY_MODE: "true"
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    command: python ingestion/kafka_dummy_stream.py consumer --bootstrap kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/sentimen-dummy-data:/app/data/sentimen-dummy-data
      - ./src/ingestion:/app/ingestion
      - ./src/workers:/app/workers
      - ./config:/app/config
    networks:
      - staywise-network
    restart: on-failure

  # ─── Simulator ────────────────────────────────────────────────
  # Container standby — jalanin manual via:
  #   docker exec -it simulator /bin/bash /app/src/simulator/entrypoint.sh

  simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.simulator
    image: staywise/simulator:latest
    container_name: simulator
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: ${REDIS_URL}
      POSTGRES_HOST: ${DW_POSTGRES_HOST}
      POSTGRES_USER: ${DW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DW_POSTGRES_DB}
      SIMULATOR_MODE: "batch"
      BATCH_SIZE: "1000"
      BATCH_INTERVAL: "20"
      DATA_PATH: "/app/data/feed_2679.csv"
      AIRFLOW_HOST: ${AIRFLOW_HOST}
      AIRFLOW_PORT: ${AIRFLOW_PORT}
      AIRFLOW_USER: ${AIRFLOW_USER}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      postgres-dw:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    networks:
      - staywise-network
    command: [ "tail", "-f", "/dev/null" ]
    restart: "no"

  # ─── pgAdmin ──────────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    env_file:
    - .env 
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: ${PGADMIN_CONFIG_SERVER_MODE}
      PGADMIN_SERVER_JSON_FILE: /var/lib/pgadmin/servers.json
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./src/db/pgadmin-entrypoint.sh:/pgadmin-entrypoint.sh
    entrypoint: /bin/sh /pgadmin-entrypoint.sh
    networks:
      - staywise-network
    restart: unless-stopped

volumes:
  postgres_airflow_data:
  postgres_mlflow_data:
  postgres_dw_data:
  mongo_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  mlflow_artifacts:
  pgadmin_data:

networks:
  staywise-network:
    driver: bridge
